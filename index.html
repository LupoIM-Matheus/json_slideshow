<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TV Power BI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="stage" aria-live="polite">
    <div id="frameDeck"></div>

    <button id="refreshConfigButton" type="button">Atualizar JSON</button>

    <section id="startOverlay">
      <div id="launcher">
        <aside id="brandPanel" aria-label="Resumo">
          <span id="brandMark">TV BI</span>
          <h1>Paineis em tela cheia</h1>
          <div id="quickStats">
            <div>
              <strong id="loadedCount">0</strong>
              <span>relatorios</span>
            </div>
            <div>
              <strong id="rotationSeconds">30s</strong>
              <span>rotacao</span>
            </div>
          </div>
        </aside>

        <div id="configPanel">
          <label for="configUrl">URL raw do JSON</label>
          <div class="inlineLoad">
            <input id="configUrl" type="url" inputmode="url" autocomplete="off" spellcheck="false" placeholder="https://raw.githubusercontent.com/usuario/repositorio/branch/reports.json">
            <button id="loadUrlButton" type="button">Carregar</button>
          </div>

          <label for="configFile">Arquivo JSON local</label>
          <div id="fileLoad">
            <input id="configFile" type="file" accept="application/json,.json">
            <button id="loadConfigButton" type="button">Importar</button>
          </div>

          <div id="configActions">
            <button id="clearConfigButton" type="button">Limpar</button>
            <button id="startButton" type="button" disabled>Iniciar tela cheia</button>
          </div>

          <p id="configStatus" role="status"></p>
        </div>
      </div>
    </section>

    <div id="statusBar">
      <span id="reportName"></span>
      <span id="timer"></span>
    </div>
  </main>

<script src="app.js"></script>
</body>
</html>
